name: Build MorphMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract ZIP
        run: unzip morphmod-fabric-1.21.1.zip

      - name: Grant execute permission for gradlew
        run: chmod +x morph-mod/gradlew

      - name: Build with Gradle
        run: cd morph-mod && ./gradlew build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphmod-jar
          path: morph-mod/build/libs/morphmod-*.jar
          if-no-files-found: error
