name: Build MorphMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract ZIP
        run: unzip morphmod-fabric-1.21.1.zip

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip
          echo "$PWD/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build with Gradle
        run: cd morph-mod && gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphmod-jar
          path: morph-mod/build/libs/morphmod-*.jar
          if-no-files-found: error
